<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>互動式點名座位表｜64人島型座位</title>
<style>
  :root{--bg:#f6f7fb;--card:#fff;--ink:#12303d;--muted:#666;--line:#d6dde3;--desk:#0e3040;--present:#b7f0c0;--absent:#ffb6b6;--late:#ffe08a;--leave:#b9dcff;--empty:#fff}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Microsoft JhengHei",system-ui,sans-serif;background:var(--bg);color:var(--ink)}
  .wrap{max-width:1500px;margin:6px auto;padding:0 8px}
  h1{margin:0 0 6px;text-align:center;font-size:22px}
  .classroom{display:grid;grid-template-columns:1fr 70px;gap:18px;align-items:stretch;background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px;box-shadow:0 2px 10px #0000000d}
  .deskArea{display:grid;grid-template-rows:repeat(3,1fr);gap:14px;min-height:560px}
  .deskRow{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;align-items:center}
  .deskRow.top .tableGroup:first-child,.deskRow.bottom .tableGroup:first-child{visibility:hidden}
  .tableGroup{border:2px solid var(--desk);background:#fbfdff;min-height:146px;padding:10px;display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:8px;align-items:center;justify-items:center}
  .seat{width:100%;max-width:74px;aspect-ratio:1/1;border:2px solid var(--desk);border-radius:50%;background:var(--empty);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;cursor:pointer;user-select:none;transition:.12s transform,.12s box-shadow,.12s background,.12s border-color;padding:2px;overflow:hidden}
  .seat:hover{transform:translateY(-2px);box-shadow:0 4px 14px #0000001a}
  .seat.present{background:var(--present);border-color:#31a24c}.seat.absent{background:var(--absent);border-color:#d92d20}.seat.late{background:var(--late);border-color:#eaaa08}.seat.leave{background:var(--leave);border-color:#1570ef}
  .seat .class{font-size:12px;font-weight:700;line-height:1.1;color:#444;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.seat .name{font-size:20px;font-weight:900;line-height:1.05;max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;-webkit-text-stroke:.35px currentColor}.seat .status{font-size:11px;line-height:1;color:#333;margin-top:1px}
  .teacherSide{border:2px solid var(--desk);display:flex;align-items:center;justify-content:center;background:#fbfdff;min-height:100%;writing-mode:vertical-rl;font-size:24px;letter-spacing:8px;font-weight:500}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0;box-shadow:0 2px 10px #0000000d}
  input{border:1px solid var(--line);border-radius:10px;padding:10px 12px;font-size:16px;min-width:150px}#sheetUrl,#webAppUrl{min-width:min(620px,92vw);flex:1 1 420px}
  button{border:0;border-radius:10px;padding:10px 14px;font-size:16px;font-weight:700;cursor:pointer;background:#222;color:#fff}button.secondary{background:#666}button.danger{background:#b42318}button.excel{background:#147a3d}button.sync{background:#175cd3}button.write{background:#7a2e0e}
  .stats{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0 10px}.pill{background:white;border:1px solid var(--line);border-radius:999px;padding:8px 12px;font-weight:700}.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:8px;color:var(--muted)}.dot{display:inline-block;width:14px;height:14px;border-radius:4px;border:1px solid #aaa;vertical-align:-2px;margin-right:4px}
  .note{font-size:14px;color:#666;text-align:center;margin-top:8px;line-height:1.7}.editBox,.sheetBox{margin-top:12px;background:white;border:1px solid var(--line);border-radius:16px;padding:14px}.editBox textarea{width:100%;height:260px;border:1px solid var(--line);border-radius:10px;padding:10px;font-size:15px;box-sizing:border-box}.hidden{display:none}.sheetStatus{text-align:center;color:#555;font-size:14px;margin-top:8px;min-height:20px}
  @media(max-width:1100px){.classroom{grid-template-columns:1fr 50px;gap:8px;padding:8px}.deskArea{gap:10px;min-height:470px}.deskRow{gap:8px}.tableGroup{min-height:120px;padding:6px;gap:5px}.seat{max-width:58px}.seat .class{font-size:10px}.seat .name{font-size:18px}.seat .status{font-size:10px}.teacherSide{font-size:20px}}
  @media(max-width:800px){.wrap{padding:0 4px}.classroom{grid-template-columns:1fr 40px}.deskArea{min-height:390px}.deskRow{gap:5px}.tableGroup{min-height:98px;padding:4px;gap:3px}.seat{max-width:46px;border-width:1.5px}.seat .class{display:none}.seat .name{font-size:15px}.seat .status{font-size:9px}.teacherSide{font-size:18px;letter-spacing:5px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="classroom">
    <div id="deskArea" class="deskArea"></div>
    <div class="teacherSide">講台</div>
  </div>
  <h1>互動式點名座位表</h1>
  <div class="toolbar">
    <input id="titleName" value="請輸入名稱" aria-label="名稱">
    <button onclick="saveTitle()">儲存</button>
    <button class="sync" onclick="syncFromSheet()">同步試算表名單</button>
    <button class="write" onclick="syncStatusToSheet(true)">同步點名狀態到試算表</button>
    <button class="secondary" onclick="toggleSheetBox()">試算表設定</button>
    <button class="secondary" onclick="toggleEdit()">編輯名單</button>
    <button class="excel" onclick="exportExcel()">匯出點名紀錄（Excel）</button>
    <button class="danger" onclick="resetAll()">一鍵重置</button>
  </div>
  <div id="sheetStatus" class="sheetStatus"></div>
  <div class="stats" id="stats"></div>
  <div class="legend"><span><i class="dot" style="background:#fff"></i>未點</span><span><i class="dot" style="background:#b7f0c0"></i>已到</span><span><i class="dot" style="background:#ffb6b6"></i>缺席</span><span><i class="dot" style="background:#ffe08a"></i>遲到</span><span><i class="dot" style="background:#b9dcff"></i>請假</span></div>
  <div class="note">操作：點座位可依序切換「未點 → 已到 → 缺席 → 遲到 → 請假」。名單可由 Google 試算表同步，點名狀態會寫在原名單右側欄位。上方「名稱」請輸入欄位標題，例如 6/30 或 7/21上午。</div>
  <div id="sheetBox" class="sheetBox hidden">
    <b>Google 試算表設定</b><br>
    <span class="note">讀取名單：A 欄班級、B 欄姓名。寫回狀態：請先部署 Apps Script，將 Web App URL 貼到下方第二格。</span><br><br>
    <div>試算表網址</div><input id="sheetUrl" aria-label="Google 試算表網址"><br><br>
    <div>Apps Script Web App URL</div><input id="webAppUrl" placeholder="貼上 https://script.google.com/macros/s/.../exec" aria-label="Apps Script Web App URL"><br><br>
    <button class="sync" onclick="saveSheetUrlAndSync()">儲存並同步名單</button>
    <button class="write" onclick="saveWebAppUrlAndSync()">儲存並同步狀態</button>
  </div>
  <div id="editBox" class="editBox hidden"><b>編輯學生班級與姓名</b><br><span class="note">一行一位，共 64 位。格式：班級,姓名。例如：701,王小明。</span><textarea id="namesText"></textarea><br><br><button onclick="saveNames()">儲存名單</button></div>
</div>
<script>
const SEAT_COUNT=64;
const KEY='attendance_seating_64_island_class_v1_google_sheet_write';
const labels={blank:'未點',present:'已到',absent:'缺席',late:'遲到',leave:'請假'};
const order=['blank','present','absent','late','leave'];
const DEFAULT_SHEET_URL='https://docs.google.com/spreadsheets/d/1BUGDhliBU1RfYVBraSIOEGaYzxCUnAm8HftP7xzC29M/edit?gid=0#gid=0';
const LAYOUT=[
  {cls:'top',tables:[null,[55,49,56,50],[43,37,44,38],[31,25,32,26],[19,13,20,14],[7,1,8,2]]},
  {cls:'middle',tables:[[63,61,64,62],[57,51,58,52],[45,39,46,40],[33,27,34,28],[21,15,22,16],[9,3,10,4]]},
  {cls:'bottom',tables:[null,[59,53,60,54],[47,41,48,42],[35,29,36,30],[23,17,24,18],[11,5,12,6]]}
];
let data=load(); let writeTimer=null;
function defaultData(){const students=[]; for(let i=0;i<SEAT_COUNT;i++){students.push({seatNo:i+1,className:'',name:`學生${i+1}`,status:'blank'});} return {titleName:'請輸入名稱',sheetUrl:DEFAULT_SHEET_URL,webAppUrl:'',lastSync:'',students};}
function load(){try{const saved=JSON.parse(localStorage.getItem(KEY)); if(!saved) return defaultData(); if(!saved.titleName) saved.titleName='請輸入名稱'; if(!saved.sheetUrl) saved.sheetUrl=DEFAULT_SHEET_URL; if(!saved.webAppUrl) saved.webAppUrl=''; if(!saved.lastSync) saved.lastSync=''; saved.students=(saved.students||[]).map((s,i)=>({seatNo:i+1,className:s.className||'',name:s.name||`學生${i+1}`,status:s.status||'blank'})); while(saved.students.length<SEAT_COUNT){const i=saved.students.length; saved.students.push({seatNo:i+1,className:'',name:`學生${i+1}`,status:'blank'});} saved.students=saved.students.slice(0,SEAT_COUNT); return saved;}catch(e){return defaultData();}}
function persist(shouldRender=true){localStorage.setItem(KEY,JSON.stringify(data)); if(shouldRender) render();}
function render(){document.getElementById('titleName').value=data.titleName||''; document.getElementById('sheetUrl').value=data.sheetUrl||DEFAULT_SHEET_URL; document.getElementById('webAppUrl').value=data.webAppUrl||''; renderLayout(); renderStats(); document.getElementById('namesText').value=data.students.map(s=>(s.className?`${s.className},${s.name}`:s.name)).join('\n'); document.getElementById('sheetStatus').textContent=data.lastSync?`狀態：${data.lastSync}`:'';}
function renderLayout(){const area=document.getElementById('deskArea'); area.innerHTML=''; LAYOUT.forEach(row=>{const rowDiv=document.createElement('div'); rowDiv.className='deskRow '+row.cls; row.tables.forEach(table=>{const t=document.createElement('div'); t.className='tableGroup'; if(table){table.forEach(no=>t.appendChild(createSeat(no)));} rowDiv.appendChild(t);}); area.appendChild(rowDiv);});}
function createSeat(no){const s=data.students[no-1]||{className:'',name:`學生${no}`,status:'blank'}; const div=document.createElement('div'); div.className='seat '+(s.status==='blank'?'':s.status); div.title=`${no}號 ${s.className||''} ${s.name}：${labels[s.status]}`; div.onclick=()=>changeStatus(no-1); div.innerHTML=`<div class="class">${escapeHtml(s.className||'')}</div><div class="name">${escapeHtml(s.name)}</div><div class="status">${labels[s.status]}</div>`; return div;}
function renderStats(){const c={blank:0,present:0,absent:0,late:0,leave:0}; data.students.forEach(s=>c[s.status]++); document.getElementById('stats').innerHTML=`<span class="pill">總人數：${SEAT_COUNT}</span><span class="pill">已到：${c.present}</span><span class="pill">缺席：${c.absent}</span><span class="pill">遲到：${c.late}</span><span class="pill">請假：${c.leave}</span><span class="pill">未點：${c.blank}</span>`;}
function changeStatus(i){const now=data.students[i].status; data.students[i].status=order[(order.indexOf(now)+1)%order.length]; persist(); autoSyncStatusToSheet();}
function resetAll(){if(confirm('確定要將所有座位狀態重置為「未點」嗎？')){data.students.forEach(s=>s.status='blank'); persist(); autoSyncStatusToSheet();}}
function saveTitle(){data.titleName=document.getElementById('titleName').value.trim()||'未命名'; persist(); autoSyncStatusToSheet();}
function toggleEdit(){document.getElementById('editBox').classList.toggle('hidden');}
function toggleSheetBox(){document.getElementById('sheetBox').classList.toggle('hidden');}
function saveNames(){const lines=document.getElementById('namesText').value.split('\n').map(x=>x.trim()).filter(Boolean); applyStudentLines(lines); data.lastSync='手動編輯名單'; persist(); alert('名單已儲存');}
function saveSheetUrlAndSync(){data.sheetUrl=document.getElementById('sheetUrl').value.trim()||DEFAULT_SHEET_URL; persist(false); syncFromSheet();}
function saveWebAppUrlAndSync(){data.webAppUrl=document.getElementById('webAppUrl').value.trim(); persist(false); syncStatusToSheet(true);}
async function syncFromSheet(){const status=document.getElementById('sheetStatus'); data.sheetUrl=document.getElementById('sheetUrl').value.trim()||data.sheetUrl||DEFAULT_SHEET_URL; status.textContent='正在讀取 Google 試算表…'; try{const res=await fetch(toCsvUrl(data.sheetUrl),{cache:'no-store'}); if(!res.ok) throw new Error(`HTTP ${res.status}`); const text=await res.text(); if(text.includes('<!DOCTYPE html')||text.includes('<html')) throw new Error('讀到的是網頁，不是試算表 CSV'); const rows=parseCsv(text).map(r=>r.map(c=>String(c||'').trim())).filter(r=>r.some(Boolean)); const students=rowsToStudents(rows); if(!students.length) throw new Error('找不到學生資料'); applyStudentRows(students); data.lastSync=`已讀取名單：${nowText()}，共 ${Math.min(students.length,SEAT_COUNT)} 人`; persist(); alert('已同步 Google 試算表名單');}catch(err){status.textContent='同步失敗：請確認試算表已開放檢視或已發布到網路。'; alert('同步失敗：'+err.message+'\n\n請確認試算表權限為「知道連結的使用者可檢視」，或在「檔案 → 共用 → 發布到網路」發布。');}}
function autoSyncStatusToSheet(){clearTimeout(writeTimer); writeTimer=setTimeout(()=>syncStatusToSheet(false),700);}
async function syncStatusToSheet(showAlert){data.webAppUrl=document.getElementById('webAppUrl').value.trim()||data.webAppUrl||''; if(!data.webAppUrl){if(showAlert) alert('請先到「試算表設定」貼上 Apps Script Web App URL。'); return;} const payload={title:data.titleName||'',updatedAt:nowText(),students:data.students.map((s,i)=>({seatNo:i+1,className:s.className||'',name:s.name||'',status:s.status||'blank',statusText:labels[s.status]||'未點'}))}; document.getElementById('sheetStatus').textContent='正在同步點名狀態到試算表…'; try{await fetch(data.webAppUrl,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded;charset=UTF-8'},body:'payload='+encodeURIComponent(JSON.stringify(payload))}); data.lastSync=`已送出點名狀態：${payload.updatedAt}`; persist(); if(showAlert) alert('已送出點名狀態到 Google 試算表；狀態會寫在原名單右側欄位');}catch(err){document.getElementById('sheetStatus').textContent='狀態同步失敗'; if(showAlert) alert('狀態同步失敗：'+err.message);}}
function toCsvUrl(url){const idMatch=url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/); if(!idMatch) throw new Error('無法辨識 Google 試算表網址'); const gidMatch=url.match(/[?&#]gid=(\d+)/); const gid=gidMatch?gidMatch[1]:'0'; return `https://docs.google.com/spreadsheets/d/${idMatch[1]}/gviz/tq?tqx=out:csv&gid=${gid}`;}
function parseCsv(text){const rows=[]; let row=[]; let cur=''; let inQuotes=false; for(let i=0;i<text.length;i++){const ch=text[i],next=text[i+1]; if(ch==='"'){if(inQuotes&&next==='"'){cur+='"'; i++;} else inQuotes=!inQuotes;} else if(ch===','&&!inQuotes){row.push(cur); cur='';} else if((ch==='\n'||ch==='\r')&&!inQuotes){if(ch==='\r'&&next==='\n') i++; row.push(cur); rows.push(row); row=[]; cur='';} else cur+=ch;} row.push(cur); rows.push(row); return rows;}
function rowsToStudents(rows){if(!rows.length) return []; const header=rows[0].map(x=>x.replace(/\s/g,'')); const hasHeader=header.some(x=>['班級','班別','年級','姓名','名字','學生姓名','座號','座位'].includes(x)); let start=hasHeader?1:0; let classIdx=-1,nameIdx=-1; if(hasHeader){classIdx=header.findIndex(x=>['班級','班別','年級'].includes(x)); nameIdx=header.findIndex(x=>['姓名','名字','學生姓名'].includes(x));} const result=[]; for(let i=start;i<rows.length;i++){const r=rows[i]; let className='',name=''; if(nameIdx>=0){name=r[nameIdx]||''; className=classIdx>=0?(r[classIdx]||''):'';} else if(r.length>=2){className=r[0]||''; name=r[1]||'';} else name=r[0]||''; if(name||className) result.push({className,name:name||className});} return result;}
function applyStudentRows(rows){const oldStatus=data.students.map(s=>s.status||'blank'); for(let i=0;i<SEAT_COUNT;i++){const s=rows[i]||{className:'',name:`學生${i+1}`}; data.students[i]={seatNo:i+1,className:s.className||'',name:s.name||`學生${i+1}`,status:oldStatus[i]||'blank'};}}
function applyStudentLines(lines){const rows=[]; for(let i=0;i<SEAT_COUNT;i++){const line=lines[i]||`學生${i+1}`; if(line.includes(',')){const parts=line.split(','); rows.push({className:(parts[0]||'').trim(),name:(parts.slice(1).join(',')||`學生${i+1}`).trim()});} else if(line.includes('，')){const parts=line.split('，'); rows.push({className:(parts[0]||'').trim(),name:(parts.slice(1).join('，')||`學生${i+1}`).trim()});} else rows.push({className:'',name:line||`學生${i+1}`});} applyStudentRows(rows);}
function exportExcel(){const now=new Date(); const pad=n=>String(n).padStart(2,'0'); const title=data.titleName||'點名座位表'; let html=`<html><head><meta charset="utf-8"></head><body><table border="1"><tr><th colspan="5">點名紀錄</th></tr><tr><td>名稱</td><td colspan="4">${escapeHtml(title)}</td></tr><tr><td>匯出時間</td><td colspan="4">${nowText()}</td></tr><tr><th>座位序</th><th>班級</th><th>姓名</th><th>狀態</th><th>備註</th></tr>`; data.students.forEach((s,i)=>{html+=`<tr><td>${i+1}</td><td>${escapeHtml(s.className||'')}</td><td>${escapeHtml(s.name)}</td><td>${labels[s.status]}</td><td></td></tr>`;}); html+='</table></body></html>'; const blob=new Blob(['\ufeff'+html],{type:'application/vnd.ms-excel'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`${title}_點名紀錄_${now.getFullYear()}${pad(now.getMonth()+1)}${pad(now.getDate())}.xls`; a.click(); URL.revokeObjectURL(a.href);}
function nowText(){const now=new Date(); const pad=n=>String(n).padStart(2,'0'); return `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;}
function escapeHtml(str){return String(str).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
render();
</script>
</body>
</html>
